    <title>Document</title>
    <script>
      class Rectangle {
        constructor(length, width) {
          this.length = length;
          this.width = width;
        }

        getValue() {
          return this.length * this.width;
        }
      }

      let inst1 = new Rectangle(10, 20);

      console.log(inst1.length);
      console.log(inst1.width);
    </script>
